server:
  port: 8083
spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/inventory_db
    username: thinh
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: public
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

app:
  ticketing:
    lock-duration: 1m